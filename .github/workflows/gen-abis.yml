name: Generate ABIs and Create PR to Apps

on:
  push:
    branches: [main]
    paths:
      - "src/**"
  workflow_dispatch:

jobs:
  gen-abis:
    name: Generate ABIs and Create PR in Apps Repo
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        run: forge build

      - name: Generate ABI TypeScript
        run: python3 .github/workflows/scripts/gen_abis.py

      - name: Checkout apps repo
        uses: actions/checkout@v5
        with:
          repository: pitchmkt/apps
          token: ${{ secrets.APPS_REPO_PAT }}
          path: apps

      - name: Update Contracts package
        run: cp /tmp/abis.ts apps/packages/contracts/src/abis.ts

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: apps/package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: apps/.nvmrc
          cache: pnpm
          cache-dependency-path: apps/pnpm-lock.yaml

      - name: Install apps dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps

      - name: Lint generated ABI file
        run: pnpm biome check --write packages/contracts/src/abis.ts
        working-directory: apps

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.APPS_REPO_PAT }}
          path: apps
          commit-message: "chore: generate ABIs from protocol"
          branch: chore/gen-abis
          delete-branch: true
          title: "chore: generate ABIs from protocol"
          body: |
            Automated ABI generation triggered by a merge to protocol.

            > No changes in this PR means the ABI hasn't changed since the last sync.
