name: Sync ABIs

on:
  push:
    branches: [main]
    paths:
      - "src/**"

jobs:
  sync-abis:
    name: Sync ABIs to apps repo
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        run: forge build

      - name: Generate ABI TypeScript
        run: |
          python3 - <<'EOF'
          import json

          contracts = [
            ("Matchweek", "matchweekAbi"),
          ]

          lines = ["// This file is auto-generated by pitchmkt/protocol. Do not edit manually."]
          for contract, export_name in contracts:
            with open(f"out/{contract}.sol/{contract}.json") as f:
              abi = json.load(f)["abi"]
            lines.append(f"export const {export_name} = {json.dumps(abi, indent=2)} as const;")

          with open("/tmp/index.ts", "w") as f:
            f.write("\n".join(lines) + "\n")
          EOF

      - name: Checkout apps repo
        uses: actions/checkout@v5
        with:
          repository: pitchmkt/apps
          token: ${{ secrets.APPS_REPO_PAT }}
          path: apps

      - name: Update ABI package
        run: cp /tmp/index.ts apps/packages/abis/src/index.ts

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.APPS_REPO_PAT }}
          path: apps
          commit-message: "chore: sync ABIs from protocol"
          branch: chore/sync-abis
          delete-branch: true
          title: "chore: sync ABIs from protocol"
          body: |
            Automated ABI sync triggered by a push to `src/` in [pitchmkt/protocol](https://github.com/pitchmkt/protocol).

            > No changes in this PR means the ABI hasn't changed since the last sync.
